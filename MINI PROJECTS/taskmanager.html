<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, rgb(255,255,255), rgb(254,215,173));
        } 
        header {
            background-color: #26323f;
            color: white;
            padding: 1rem 0;
            text-align: center;
        }
        .container {
            margin: 2rem auto;
            max-width: 800px;
            padding: 1rem;
            background: rgb(68, 57, 57);
            box-shadow: 0 2px 4px rgba(255, 255, 255, 0.983);
        }
        .task-form, .dashboard {
            margin-bottom: 2rem;
        }
        input, select, button {
            margin: 0.5rem 0;
            padding: 0.5rem;
            width: 100%;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        table, th, td {
            border: 1px solid #ddd;
        }
        th, td {
            padding: 0.75rem;
            text-align: left;
        }
    </style>
</head>
<body>
    <header>
        <h1>Task Management System</h1>
    </header>
    <div class="container">
        <div class="task-form">
            <h2>Create Your Task</h2>
            <form id="taskForm">
                <input type="text" id="taskTitle" placeholder="Task Title" required />
                <input type="text" id="taskDescription" placeholder="Task Description" />
                <input type="date" id="taskDueDate" required />
                <input type="date" id="taskSubmissionDate" required placeholder="Submission Date" />
                <select id="assignedTo" required>
                    <option value="">Assign to Employee</option>
                </select>
                <button type="submit">Create Your Task</button>
            </form>
        </div>

        <div class="dashboard">
            <h2>Employee Dashboard</h2>
            <table>
                <thead>
                    <tr>
                        <th>Employee Name</th>
                        <th>Completed Tasks</th>
                        <th>Pending Tasks</th>
                        <th>Remaining Days</th>
                    </tr>
                </thead>
                <tbody id="employeeDashboard">
                </tbody>
            </table>
            <button><a href="mainpage.html">GO BACK TO HOME</a></button>
        </div>
    </div>

    <script>
        const employees = {
            "1": { name: "Sumit", completed_tasks: 0, pending_tasks: 0 },
            "2": { name: "Rahul", completed_tasks: 0, pending_tasks: 0 },
            "3": { name: "Amit ", completed_tasks: 0, pending_tasks: 0 },
            "4": { name: "Arjun", completed_tasks: 0, pending_tasks: 0 },
            "5": { name: "Ankit", completed_tasks: 0, pending_tasks: 0 },
        };

        const populateEmployeeDashboard = () => {
            const dashboard = document.getElementById('employeeDashboard');
            dashboard.innerHTML = '';
            for (let id in employees) {
                const employee = employees[id];
                dashboard.innerHTML += `
                    <tr>
                        <td>${employee.name}</td>
                        <td>${employee.completed_tasks}</td>
                        <td>${employee.pending_tasks}</td>
                        <td>${employee.remaining_days || "N/A"}</td>
                    </tr>
                `;
            }
        };

        const populateEmployeeDropdown = () => {
            const dropdown = document.getElementById('assignedTo');
            dropdown.innerHTML = '<option value="">Assign to Employee</option>';
            for (let id in employees) {
                dropdown.innerHTML += `<option value="${id}">${employees[id].name}</option>`;
            }
        };

        const calculateRemainingDays = (dueDate) => {
            const today = new Date();
            const dueDateObj = new Date(dueDate);
            const timeDiff = dueDateObj - today;
            const remainingDays = Math.ceil(timeDiff / (1000 * 3600 * 24)); // Convert time difference to days
            return remainingDays;
        };

        document.getElementById('taskForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const title = document.getElementById('taskTitle').value;
            const description = document.getElementById('taskDescription').value;
            const dueDate = document.getElementById('taskDueDate').value;
            const submissionDate = document.getElementById('taskSubmissionDate').value;
            const assignedTo = document.getElementById('assignedTo').value;

            if (!assignedTo) {
                alert('Please assign the task to an employee.');
                return;
            }

            if (!submissionDate || !dueDate) {
                alert('Please provide both task due date and submission date.');
                return;
            }

            const remainingDays = calculateRemainingDays(submissionDate);

            // Update the pending tasks count and remaining days for the assigned employee
            employees[assignedTo].pending_tasks += 1;
            employees[assignedTo].remaining_days = remainingDays;

            // Refresh the dashboard to reflect changes
            populateEmployeeDashboard();

            alert(`Task Created: ${title}`);

            // Clear the form fields
            document.getElementById('taskForm').reset();
        });

        populateEmployeeDashboard();
        populateEmployeeDropdown();
    </script>
</body>
</html>
