</head>
<body>
   
    <nav>
        <div class="nav-container">
            <div class="logo" data-aos="zoom-in" data-aos-duration="1000">
                <img  src="">
                <span>TASK MANAGEMENT SYSTEM</span>
            </div>
            <div class="links">
                <div class="link" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="100"><a href="mainpage.html">Home</a></div>
                <div class="link" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="200"><a href="login.html">Login</a></div>
                <div class="link" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="300"><a href="#">Add Task</a></div>
                <div class="link" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="400"><a href="#">Services</a></div>
                <div class="link" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="500"><a href="#"></a></div>
                <div class="link contact-btn" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="600"><a href="#">Contact Us</a></div>
            </div>
            <i class="fa-solid fa-bars hamburg" onclick="hamburg()"></i>
        </div>
        <div class="dropdown">
            <div class="links">
                <a href="">Home</a>
                
                <a href="">Services</a>
                <a href="">About</a>
                <a href="">Contact Us</a>
                <i class="fa-solid fa-xmark cancel" onclick="cancel()"></i>
            </div>
        </div>
    </nav>
        <section>
            <div class="main-container">
                <div class="image" data-aos="zoom-in-right" data-aos-duration="2500">
                    <img src="main.png" alt="">
                </div>
                <div class="content">
                    <h1 data-aos="fade-left" data-aos-duration="1000" data-aos-delay="800">Hey,This is <span>TASK MANAGER</span></h1>
                
                   
                   <br>
                   <body>
                    <div class="container" id="login-register">
                        <h2 id="form-title">Login</h2>
                        <form id="user-form">
                            <input type="text" id="name-field" placeholder="Name" style="display: none;">
                            <input type="email" id="email" placeholder="Email" required>
                            <input type="password" id="password" placeholder="Password" required>
                            <button type="submit"><a href="mainpage.html">Submit</button>
                        </form>
                        <div class="switch">
                            <p id="toggle-text">Don't have an account? <a href="#" onclick="toggleForm()">Register</a></p>
                        </div>
                    </div>
                
                    <script>
                        function toggleForm() {
                            const title = document.getElementById('form-title');
                            const nameField = document.getElementById('name-field');
                            const toggleText = document.getElementById('toggle-text');
                
                            if (title.innerText === 'Login') {
                                title.innerText = 'Register';
                                nameField.style.display = 'block';
                                toggleText.innerHTML = 'Already have an account? <a href="#" onclick="toggleForm()">Login</a>';
                            } else {
                                title.innerText = 'Login';
                                nameField.style.display = 'none';
                                toggleText.innerHTML = "Don't have an account? <a href=\"#\" onclick=\"toggleForm()\">Register</a>";
                            }
                        }
                    </script>
                </body>
                    <div class="social-links" data-aos="flip-down" data-aos-duration="1000" data-aos-delay="1200">
                        <a href="#" ><i class="fa-brands fa-github"></i></a>
                        <a href="#"><i class="fa-brands fa-facebook"></i></a>
                        <a href="#"><i class="fa-brands fa-linkedin"></i></a>
                        <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
                    </div>
                   
                </div>
            </div>
        </section>
        <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
        <script>
          AOS.init({offset:0});
        </script>
        <script>
            function hamburg(){
                const navbar = document.querySelector(".dropdown")
                navbar.style.transform = "translateY(0px)"
            }
            function cancel(){
                const navbar = document.querySelector(".dropdown")
                navbar.style.transform = "translateY(-500px)"
            }
        </script>
</body>
</html>
